# GeoVision AI Miner - STAC API Development Environment
version: '3.8'

services:
  stac-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - STAC_CATALOG_ROOT=/app/stac_catalogs
      - GEOVISION_S3_BUCKET=s3://geovision-ai-miner-data
      - STAC_API_BASE_URL=http://localhost:8000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-west-2}
    volumes:
      - ./stac_catalogs:/app/stac_catalogs:ro
      - ./stac_server.py:/app/stac_server.py
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - stac-api
    restart: unless-stopped

volumes:
  redis_data: