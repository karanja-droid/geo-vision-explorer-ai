# GeoVision AI Miner - Celery Services Configuration
# Docker Compose configuration for Celery workers and monitoring

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  celery-worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      - DATABASE_URL=postgresql://geovision:password@postgres:5432/geovision
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET:-geovision-ai-miner-data}
      - ENABLE_FEATURE_STORE=true
      - ENABLE_AI_INFERENCE=true
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      - DATABASE_URL=postgresql://geovision:password@postgres:5432/geovision
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    restart: unless-stopped

  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  postgres:
    image: postgis/postgis:14-3.2
    environment:
      - POSTGRES_USER=geovision
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=geovision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geovision"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: