apiVersion: v1
kind: Namespace
metadata:
  name: geovision-ai-miner
  labels:
    name: geovision-ai-miner
    environment: production
    app: geovision-ai-miner
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: geovision-resource-quota
  namespace: geovision-ai-miner
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "20"
    configmaps: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: geovision-limit-range
  namespace: geovision-ai-miner
spec:
  limits:
  - default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
  - max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "128Mi"
    type: Container