name: Container Security Scan

on:
  push:
    branches: [main, develop]
    paths: 
      - 'Dockerfile*'
      - 'backend/Dockerfile*'
      - '.dockerignore'
      - 'docker-compose*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'backend/Dockerfile*'
      - '.dockerignore'
      - 'docker-compose*.yml'
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-scan:
    name: Build and Scan Container Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    
    strategy:
      matrix:
        image:
          - name: frontend
            dockerfile: Dockerfile.frontend
            context: .
          - name: backend
            dockerfile: backend/Dockerfile
            context: backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.image.context }}
        file: ${{ matrix.image.dockerfile }}
        push: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image.name }}:latest
        format: 'sarif'
        output: 'trivy-${{ matrix.image.name }}.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
        exit-code: '0'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-${{ matrix.image.name }}.sarif'
        category: 'trivy-${{ matrix.image.name }}'
    
    - name: Run Trivy vulnerability scanner (JSON output)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image.name }}:latest
        format: 'json'
        output: 'trivy-${{ matrix.image.name }}.json'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
    
    - name: Upload Trivy JSON results
      uses: actions/upload-artifact@v3
      with:
        name: trivy-${{ matrix.image.name }}-results
        path: 'trivy-${{ matrix.image.name }}.json'
      if: always()

  docker-bench-security:
    name: Docker Bench Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Docker Bench Security
      run: |
        docker run --rm --net host --pid host --userns host --cap-add audit_control \
          -e DOCKER_CONTENT_TRUST=$DOCKER_CONTENT_TRUST \
          -v /etc:/etc:ro \
          -v /usr/bin/containerd:/usr/bin/containerd:ro \
          -v /usr/bin/runc:/usr/bin/runc:ro \
          -v /usr/lib/systemd:/usr/lib/systemd:ro \
          -v /var/lib:/var/lib:ro \
          -v /var/run/docker.sock:/var/run/docker.sock:ro \
          --label docker_bench_security \
          docker/docker-bench-security > docker-bench-results.txt
      continue-on-error: true
    
    - name: Upload Docker Bench results
      uses: actions/upload-artifact@v3
      with:
        name: docker-bench-security-results
        path: docker-bench-results.txt
      if: always()

  hadolint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        dockerfile:
          - Dockerfile.frontend
          - backend/Dockerfile
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Hadolint
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: ${{ matrix.dockerfile }}
        format: sarif
        output-file: hadolint-${{ matrix.dockerfile }}.sarif
        no-fail: true
    
    - name: Upload Hadolint results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: hadolint-${{ matrix.dockerfile }}.sarif
        category: hadolint-${{ matrix.dockerfile }}
      if: always()

  container-structure-test:
    name: Container Structure Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build test images
      run: |
        docker build -t geominer-frontend:test -f Dockerfile.frontend .
        docker build -t geominer-backend:test -f backend/Dockerfile backend/
    
    - name: Install container-structure-test
      run: |
        curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
        chmod +x container-structure-test-linux-amd64
        sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test
    
    - name: Create structure test config
      run: |
        cat > frontend-structure-test.yaml << 'EOF'
        schemaVersion: 2.0.0
        
        commandTests:
          - name: "nginx is installed"
            command: "nginx"
            args: ["-v"]
            expectedOutput: ["nginx version"]
        
        fileExistenceTests:
          - name: 'nginx config'
            path: '/etc/nginx/nginx.conf'
            shouldExist: true
          - name: 'app files'
            path: '/usr/share/nginx/html/index.html'
            shouldExist: true
        
        metadataTest:
          exposedPorts: ["80"]
          workdir: "/usr/share/nginx/html"
        EOF
        
        cat > backend-structure-test.yaml << 'EOF'
        schemaVersion: 2.0.0
        
        commandTests:
          - name: "python is installed"
            command: "python"
            args: ["--version"]
            expectedOutput: ["Python 3"]
        
        fileExistenceTests:
          - name: 'app directory'
            path: '/app'
            shouldExist: true
          - name: 'requirements file'
            path: '/app/requirements.txt'
            shouldExist: true
        
        metadataTest:
          exposedPorts: ["8000"]
          workdir: "/app"
        EOF
    
    - name: Run structure tests
      run: |
        container-structure-test test --image geominer-frontend:test --config frontend-structure-test.yaml --output junit --test-report frontend-structure-test.xml
        container-structure-test test --image geominer-backend:test --config backend-structure-test.yaml --output junit --test-report backend-structure-test.xml
      continue-on-error: true
    
    - name: Upload structure test results
      uses: actions/upload-artifact@v3
      with:
        name: container-structure-test-results
        path: |
          frontend-structure-test.xml
          backend-structure-test.xml
      if: always()

  grype-scan:
    name: Grype Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build images for scanning
      run: |
        docker build -t geominer-frontend:scan -f Dockerfile.frontend .
        docker build -t geominer-backend:scan -f backend/Dockerfile backend/
    
    - name: Install Grype
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
    
    - name: Scan frontend image with Grype
      run: |
        grype geominer-frontend:scan -o json > grype-frontend.json
        grype geominer-frontend:scan -o sarif > grype-frontend.sarif
      continue-on-error: true
    
    - name: Scan backend image with Grype
      run: |
        grype geominer-backend:scan -o json > grype-backend.json
        grype geominer-backend:scan -o sarif > grype-backend.sarif
      continue-on-error: true
    
    - name: Upload Grype SARIF results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: |
          grype-frontend.sarif
          grype-backend.sarif
      if: always()
    
    - name: Upload Grype JSON results
      uses: actions/upload-artifact@v3
      with:
        name: grype-scan-results
        path: |
          grype-frontend.json
          grype-backend.json
      if: always()

  container-security-summary:
    name: Container Security Summary
    runs-on: ubuntu-latest
    needs: [build-and-scan, docker-bench-security, hadolint, container-structure-test, grype-scan]
    if: always()
    
    steps:
    - name: Generate Container Security Summary
      run: |
        echo "## 🐳 Container Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Scan Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Tool | Status | Description |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
        echo "| Trivy | ${{ needs.build-and-scan.result }} | Vulnerability scanning |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker Bench | ${{ needs.docker-bench-security.result }} | Docker security best practices |" >> $GITHUB_STEP_SUMMARY
        echo "| Hadolint | ${{ needs.hadolint.result }} | Dockerfile linting |" >> $GITHUB_STEP_SUMMARY
        echo "| Structure Test | ${{ needs.container-structure-test.result }} | Container structure validation |" >> $GITHUB_STEP_SUMMARY
        echo "| Grype | ${{ needs.grype-scan.result }} | Alternative vulnerability scanning |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📊 Detailed results are available in the Security tab and as workflow artifacts." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔍 Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "1. Review vulnerability findings in the Security tab" >> $GITHUB_STEP_SUMMARY
        echo "2. Address any CRITICAL or HIGH severity issues" >> $GITHUB_STEP_SUMMARY
        echo "3. Update base images and dependencies regularly" >> $GITHUB_STEP_SUMMARY
        echo "4. Follow Docker security best practices" >> $GITHUB_STEP_SUMMARY

  notify-on-critical:
    name: Notify on Critical Vulnerabilities
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    if: failure() && github.event_name != 'pull_request'
    
    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#security-alerts'
        webhook_url: ${{ secrets.SLACK_WEBHOOK_SECURITY }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
        text: |
          🚨 Critical Container Vulnerabilities Detected
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Please review and remediate immediately.
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SECURITY }}