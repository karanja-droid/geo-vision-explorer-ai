apiVersion: v1
kind: Service
metadata:
  name: geovision-backend
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: geovision-ai-miner
    component: backend

---
apiVersion: v1
kind: Service
metadata:
  name: geovision-frontend
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  selector:
    app: geovision-ai-miner
    component: frontend

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
    component: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: geovision-ai-miner
    component: redis

---
# Headless service for StatefulSet (if using Redis cluster)
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
    component: redis
spec:
  clusterIP: None
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: geovision-ai-miner
    component: redis

---
# Load Balancer Service (for external access)
apiVersion: v1
kind: Service
metadata:
  name: geovision-loadbalancer
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:region:account:certificate/cert-id"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  selector:
    app: geovision-ai-miner
    component: frontend
  loadBalancerSourceRanges:
  - 0.0.0.0/0  # Restrict this in production

---
# NodePort Service (alternative for external access)
apiVersion: v1
kind: Service
metadata:
  name: geovision-nodeport
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    nodePort: 30443
    protocol: TCP
    name: https
  selector:
    app: geovision-ai-miner
    component: frontend