# Redis Configuration for GeoVision AI Miner
# Master node configuration

# Network
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# General
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# Snapshotting
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Replication
# replicaof <masterip> <masterport>
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600
replica-priority 100

# Security
# requirepass geovision-redis-password
# masterauth geovision-redis-password

# Clients
maxclients 10000

# Memory Management
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Lazy Freeing
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Append Only Mode
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Lua Scripting
lua-time-limit 5000

# Redis Cluster (disabled for master-replica setup)
# cluster-enabled no
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000
# cluster-announce-ip 127.0.0.1
# cluster-announce-port 6379
# cluster-announce-bus-port 16379

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency Monitor
latency-monitor-threshold 100

# Event Notification
notify-keyspace-events ""

# Hash
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List
list-max-ziplist-size -2
list-compress-depth 0

# Set
set-max-intset-entries 512

# Sorted Set
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog
hll-sparse-max-bytes 3000

# Streams
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active Rehashing
activerehashing yes

# Client Output Buffer Limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client Query Buffer Limit
client-query-buffer-limit 1gb

# Protocol Buffer Limit
proto-max-bulk-len 512mb

# Frequency
hz 10

# Dynamic HZ
dynamic-hz yes

# AOF Rewrite Incremental Fsync
aof-rewrite-incremental-fsync yes

# RDB Save Incremental Fsync
rdb-save-incremental-fsync yes

# Modules
# loadmodule /path/to/module.so

# GeoVision Specific Settings
# Custom settings for geological data processing

# Increase timeout for long-running geological analysis
timeout 300

# Optimize for geological data patterns
hash-max-ziplist-entries 1024
zset-max-ziplist-entries 256

# Enable keyspace notifications for real-time features
notify-keyspace-events "Ex"

# Optimize for geospatial operations
# (Redis has built-in geospatial support, no additional config needed)

# Performance tuning for mining data
tcp-keepalive 60
tcp-backlog 1024

# Memory optimization for large datasets
maxmemory-samples 10
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes

# Logging for debugging geological operations
loglevel verbose
syslog-enabled no

# Custom Lua scripts timeout (for complex geological calculations)
lua-time-limit 10000

# Optimize for real-time collaboration features
client-output-buffer-limit pubsub 64mb 16mb 60

# Enable latency monitoring for performance optimization
latency-monitor-threshold 50