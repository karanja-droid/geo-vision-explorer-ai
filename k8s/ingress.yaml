apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geovision-ingress
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # Rate Limiting
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/rate-limit-connections: "10"
    
    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options DENY;
      add_header X-Content-Type-Options nosniff;
      add_header X-XSS-Protection "1; mode=block";
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api.mapbox.com; style-src 'self' 'unsafe-inline' https://api.mapbox.com; img-src 'self' data: https:; connect-src 'self' https://api.mapbox.com wss:; font-src 'self' https:";
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://geovision-ai-miner.com,https://www.geovision-ai-miner.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # SSL/TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384"
    
    # Caching
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
      
      location /api/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
      }
    
    # Monitoring
    nginx.ingress.kubernetes.io/enable-access-log: "true"
    nginx.ingress.kubernetes.io/enable-rewrite-log: "true"
spec:
  tls:
  - hosts:
    - geovision-ai-miner.com
    - www.geovision-ai-miner.com
    - api.geovision-ai-miner.com
    secretName: geovision-tls-secret
  rules:
  - host: geo-miner.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: geovision-backend
            port:
              number: 8080
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: geovision-backend
            port:
              number: 8080
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: geovision-backend
            port:
              number: 8080
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: geovision-backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: geovision-frontend
            port:
              number: 80
  - host: www.geo-miner.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: geovision-frontend
            port:
              number: 80
  - host: api.geo-miner.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: geovision-backend
            port:
              number: 8080

---
# Alternative Ingress for AWS ALB
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geovision-alb-ingress
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
  annotations:
    # AWS Load Balancer Controller
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/load-balancer-name: "geovision-alb"
    
    # SSL/TLS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:region:account:certificate/cert-id"
    
    # Health Checks
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    
    # Security Groups
    alb.ingress.kubernetes.io/security-groups: "sg-xxxxxxxxx"
    alb.ingress.kubernetes.io/subnets: "subnet-xxxxxxxx,subnet-yyyyyyyy"
    
    # WAF
    alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:region:account:regional/webacl/name/id"
    
    # Logging
    alb.ingress.kubernetes.io/load-balancer-attributes: |
      access_logs.s3.enabled=true,
      access_logs.s3.bucket=geovision-alb-logs,
      access_logs.s3.prefix=geovision
spec:
  tls:
  - hosts:
    - geovision-ai-miner.com
    - www.geovision-ai-miner.com
  rules:
  - host: geovision-ai-miner.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: geovision-backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: geovision-frontend
            port:
              number: 80

---
# Network Policy for Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: geovision-ingress-policy
  namespace: geovision-ai-miner
spec:
  podSelector:
    matchLabels:
      app: geovision-ai-miner
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 443   # HTTPS
    - protocol: TCP
      port: 80    # HTTP