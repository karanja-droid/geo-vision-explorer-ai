# This is a template file - actual secrets should be created using kubectl or sealed-secrets
apiVersion: v1
kind: Secret
metadata:
  name: geovision-secrets
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
type: Opaque
stringData:
  # Database Secrets (Base64 encoded in production)
  SUPABASE_URL: "https://your-project.supabase.co"
  SUPABASE_ANON_KEY: "your-supabase-anon-key"
  SUPABASE_SERVICE_ROLE_KEY: "your-supabase-service-role-key"
  DATABASE_URL: "postgresql://user:password@host:5432/database"
  
  # Redis Secrets
  REDIS_PASSWORD: "your-redis-password"
  REDIS_URL: "redis://:password@redis-service:6379/0"
  
  # External API Keys
  MAPBOX_ACCESS_TOKEN: "your-mapbox-token"
  OPENAI_API_KEY: "your-openai-api-key"
  ANTHROPIC_API_KEY: "your-anthropic-api-key"
  
  # Monitoring Secrets
  SENTRY_DSN: "https://your-sentry-dsn@sentry.io/project-id"
  GRAFANA_ADMIN_PASSWORD: "your-grafana-password"
  PROMETHEUS_PASSWORD: "your-prometheus-password"
  
  # Security Secrets
  JWT_SECRET: "your-jwt-secret-key"
  ENCRYPTION_KEY: "your-32-character-encryption-key"
  SESSION_SECRET: "your-session-secret"
  
  # Neo4j Secrets
  NEO4J_URI: "bolt://neo4j-service:7687"
  NEO4J_USERNAME: "neo4j"
  NEO4J_PASSWORD: "your-neo4j-password"
  
  # Email Configuration
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-password"
  
  # Webhook Secrets
  STRIPE_WEBHOOK_SECRET: "whsec_your-stripe-webhook-secret"
  GITHUB_WEBHOOK_SECRET: "your-github-webhook-secret"

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
type: kubernetes.io/tls
data:
  # TLS Certificate and Key (Base64 encoded)
  # Generate with: kubectl create secret tls tls-secret --cert=path/to/tls.crt --key=path/to/tls.key
  tls.crt: LS0tLS1CRUdJTi... # Base64 encoded certificate
  tls.key: LS0tLS1CRUdJTi... # Base64 encoded private key

---
# Sealed Secret Example (for GitOps)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: geovision-sealed-secrets
  namespace: geovision-ai-miner
spec:
  encryptedData:
    # These would be encrypted using sealed-secrets controller
    # Example: echo -n "secret-value" | kubeseal --raw --from-file=/dev/stdin --name=geovision-sealed-secrets --namespace=geovision-ai-miner
    DATABASE_URL: AgBy3i4OJSWK+PiTySBXoMLO9sSJIb7nufy... # Encrypted
    SUPABASE_SERVICE_ROLE_KEY: AgAKAoiQm7QDhii+CxmkFa... # Encrypted
    JWT_SECRET: AgAKAoiQm7QDhii+CxmkFa... # Encrypted
  template:
    metadata:
      name: geovision-sealed-secrets
      namespace: geovision-ai-miner
    type: Opaque

---
# Service Account for the application
apiVersion: v1
kind: ServiceAccount
metadata:
  name: geovision-service-account
  namespace: geovision-ai-miner
  labels:
    app: geovision-ai-miner
automountServiceAccountToken: true

---
# Role for the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: geovision-ai-miner
  name: geovision-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
# Role binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: geovision-role-binding
  namespace: geovision-ai-miner
subjects:
- kind: ServiceAccount
  name: geovision-service-account
  namespace: geovision-ai-miner
roleRef:
  kind: Role
  name: geovision-role
  apiGroup: rbac.authorization.k8s.io